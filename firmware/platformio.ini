; PlatformIO project configuration — Sleep Tracker firmware
; Board: Waveshare ESP32-S3-Touch-AMOLED-1.8  (ESP32-S3R8: 16 MB flash, 8 MB OCTAL PSRAM)
;
; This builds the EXISTING ESP-IDF project (main/ + components/) — framework = espidf.
; `src_dir = main` points PlatformIO at ESP-IDF's main/ folder instead of its default src/,
; so the same tree still builds with native `idf.py` too.
; See firmware/README.md for build/flash/monitor instructions.

[platformio]
src_dir = main

[env:esp32s3-amoled]
; Pinned: the latest platform (7.0.x) ships ESP-IDF 6.0.1 + GCC 15.2, which hits an
; internal-compiler-error (segfault) building ESP-IDF's own esp_lcd RGB driver.
; 6.11.0 uses a mature toolchain (ESP-IDF 5.4 / GCC 14) with esp_driver_i2c + octal PSRAM.
platform  = espressif32@6.11.0
board     = esp32-s3-devkitc-1   ; generic ESP32-S3; overrides below match the S3R8 module
framework = espidf

; ---- flash / partitions (match sdkconfig.defaults) ----
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_build.partitions  = partitions.csv

; ---- USB: the board's USB-C is the S3 native USB-Serial/JTAG (enumerates as COM6) ----
upload_port   = COM6
monitor_port  = COM6
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; PSRAM, CPU freq, power-management, etc. are set in sdkconfig.defaults.
